<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MoonLive Control</title>

<style>
body{
    background:#070b1b;
    color:white;
    font-family:Yu Gothic;
    margin:0;
    padding:25px;
}

.panel{
    width:380px;
    margin:auto;
    background:#11172d;
    padding:20px;
    border-radius:18px;
    border:1px solid rgba(255,220,120,.5);
}

h1{
    text-align:center;
    color:#ffe788;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:8px;
    padding:14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.small{background:#6ca7ff;}
.medium{background:#8f7cff;}
.large{background:#ffd86b;}
.god{
    background:linear-gradient(90deg,#fff6b0,#ffd14a);
}

.other{
    background:#dddddd;
}
</style>

</head>

<body>

<div class="panel">

<h1>🌕 MoonLive Control</h1>

<input
id="giverName"
placeholder="ギフト送信者の名前">

<button class="small"
onclick="gift('smallGift')">
🌙 小ギフト
</button>

<button class="medium"
onclick="gift('mediumGift')">
🌕 中ギフト
</button>

<button class="large"
onclick="gift('largeGift')">
⭐ 大ギフト
</button>

<button class="god"
onclick="gift('godGift')">
👑 月神降臨
</button>

<hr>

<button class="other"
onclick="gift('addFragments')">
欠片＋10
</button>

<button class="other"
onclick="gift('resetMoon')">
リセット
</button>

</div>

<script>

const socket=new WebSocket("ws://localhost:3000");

socket.onopen=()=>{

console.log("Connected");

}

function gift(type){

const name=document.getElementById("giverName").value||"月の民";

socket.send(JSON.stringify({

type:"command",

command:{

type:type,

name:name

}

}));

}

</script>

</body>
</html>
