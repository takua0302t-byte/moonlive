<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoonLive Legendary Edition</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main id="moonlive" class="moonlive">

    <!-- 常時演出 -->
    <div id="ambientStars" class="ambient-stars"></div>
    <div id="moonParticles" class="moon-particles"></div>

    <!-- 上中央：月とタイトル -->
    <section class="top-oracle">
      <div class="moon-core">
        <img src="moon.png" alt="Moon" id="mainMoon" class="main-moon">
      </div>

      <div class="brand-title">
        <div class="brand-sub">月から届く神託</div>
        <h1>月心神楽</h1>
        <p>みんなの応援で満月を目指そう</p>
      </div>
    </section>

    <!-- 左下：月の欠片HUD -->
    <section class="fragment-hud">
      <div class="hud-label">🌙 月の欠片</div>

      <div class="phase-row">
        <span>🌑 新月</span>
        <span>🌒 三日月</span>
        <span>🌓 半月</span>
        <span>🌕 満月</span>
      </div>

      <div class="gauge">
        <div id="gaugeFill" class="gauge-fill"></div>
      </div>

      <div class="fragment-count">
        <span id="fragments">245</span> / <span id="maxFragments">500</span>
      </div>
    </section>
        <!-- 右下：現在の試練 -->
    <section class="trial-hud">
      <div class="trial-label">📜 現在の試練</div>

      <div id="trialTitle" class="trial-title">
        月の導きを待機中
      </div>

      <div id="trialTimer" class="trial-timer">
        残り時間 --:--
      </div>
    </section>

    <!-- ポップアップ -->
    <div id="popup" class="popup">
      <div id="popupTitle" class="popup-title"></div>
      <div id="popupName" class="popup-name"></div>
      <div id="popupText" class="popup-text"></div>
    </div>

    <!-- 月神表示 -->
    <div id="moonGodBoard" class="moon-god-board">
      <div>🌕 今宵の月神</div>
      <strong id="moonGodName">---</strong>
    </div>

    <!-- ルーレット -->
    <div id="roulette" class="roulette">
      <div class="roulette-title">月の審判</div>
      <div id="rouletteText">運命を選定中...</div>
    </div>

    <!-- 暗転 -->
    <div id="blackout" class="blackout"></div>

    <!-- エフェクト描画 -->
    <div id="effectLayer"></div>

  </main>

  <script src="script.js"></script>

</body>
</html>
